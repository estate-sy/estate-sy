<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - العقارات السورية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="apple-touch-icon" href="img/favicon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="العقارات السورية">
    <meta name="theme-color" content="#1e3a5f">
    <style>
        .google-btn {
            display: flex; align-items: center; justify-content: center; gap: 14px;
            width: 100%; padding: 16px 24px; background: #fff; border: 2px solid #e5e7eb;
            border-radius: 16px; font-size: 1rem; font-weight: 700; color: #374151;
            cursor: pointer; transition: all 0.15s; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .google-btn:hover  { background: #f9fafb; border-color: #d1d5db; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .google-btn:active { transform: scale(0.97); }
        .google-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .google-logo { width: 24px; height: 24px; flex-shrink: 0; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div id="loadingOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:9999; align-items:center; justify-content:center; flex-direction:column; gap:1rem;">
        <div style="width:3rem; height:3rem; border:4px solid var(--color-primary); border-top-color:transparent; border-radius:50%;" class="animate-spin"></div>
        <p id="loadingMsg" style="color:white; font-weight:bold; font-size:1.05rem;">جاري تحويلك إلى Google...</p>
    </div>

    <div class="max-w-sm w-full bg-white shadow-2xl rounded-3xl overflow-hidden">

        <div class="gradient-header p-8 text-white text-center">
            <a class="brand-block" href="index.html" style="justify-content:center; margin-bottom:0.5rem;">
                <img class="brand-img" src="img/logo.png" alt="العقارات السورية">
                <div class="brand-texts">
                    <span class="brand-text-en">Syria Estate</span>
                    <span class="brand-text-ar">العقارات السورية</span>
                </div>
            </a>
            <p class="text-gray-300 text-sm mt-2">منصة العقارات الأولى في سوريا</p>
        </div>

        <div class="p-8 flex flex-col items-center gap-6">
            <div class="text-center">
                <h2 class="text-xl font-black text-gray-800 mb-1">مرحباً بك 👋</h2>
                <p class="text-gray-500 text-sm">سجّل دخولك بنقرة واحدة عبر حساب Google</p>
            </div>

            <button id="googleBtn" class="google-btn" onclick="loginWithGoogle()">
                <svg class="google-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.4 30.2 0 24 0 14.6 0 6.6 5.4 2.6 13.3l7.9 6.1C12.4 13.2 17.7 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.6h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-9.9 7.1-17.1z"/>
                    <path fill="#FBBC05" d="M10.5 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.1.7-4.6l-7.9-6.1A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.9-6.1z"/>
                    <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.3 0-11.6-3.7-13.5-9.4l-7.9 6.1C6.6 42.6 14.6 48 24 48z"/>
                </svg>
                <span>المتابعة باستخدام Google</span>
            </button>

            <p id="errorMsg" class="text-red-500 text-sm text-center hidden"></p>

            <a href="index.html" class="text-gray-400 text-sm font-bold hover:text-blue-900 transition-colors flex items-center gap-1">
                <i class="fas fa-eye text-xs"></i>
                تصفح كضيف (بدون تفاعل)
            </a>
        </div>

        <div class="bg-gray-50 px-6 py-4 text-center border-t border-gray-100">
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wide">
                جميع الحقوق محفوظة لمنصة العقارات السورية &copy; 2026
            </p>
        </div>
    </div>

    <!-- ═══ الملف المركزي: تهيئة Supabase وكل الدوال المشتركة ═══ -->
    <script type="module" src="app.js"></script>

    <!-- ═══ منطق هذه الصفحة فقط ═══ -->
    <script type="module">
        const { Auth } = window.SEApp;

        const overlay    = document.getElementById('loadingOverlay');
        const loadingMsg = document.getElementById('loadingMsg');
        const errorMsg   = document.getElementById('errorMsg');
        const googleBtn  = document.getElementById('googleBtn');

        function showLoad(msg = 'جاري تحويلك إلى Google...') {
            loadingMsg.textContent = msg;
            overlay.style.display  = 'flex';
            googleBtn.disabled     = true;
        }
        function hideLoad() {
            overlay.style.display = 'none';
            googleBtn.disabled    = false;
        }
        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
        }

        Auth.redirectIfLoggedIn('profile.html');

        async function loginWithGoogle() {
            showLoad('جاري تحويلك إلى Google...');
            errorMsg.classList.add('hidden');

            const { error } = await Auth.loginWithGoogle('profile.html');
            if (error) {
                console.error('❌ Google OAuth error:', error.message);
                hideLoad();
                showError('خطأ في تسجيل الدخول عبر Google: ' + error.message);
            }
        }

        window.loginWithGoogle = loginWithGoogle;
        console.log('🚀 login.html ready — العقارات السورية');
    </script>
</body>
</html>
