<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل مع المطورين - العقارات السورية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="العقارات السورية">
    <meta name="theme-color" content="#1e3a5f">
</head>
<body>
    <header class="gradient-header text-white p-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <a class="brand-block" href="index.html">
                <img class="brand-img" src="img/logo.png" alt="العقارات السورية">
                <div class="brand-texts">
                    <span class="brand-text-en">Syria Estate</span>
                    <span class="brand-text-ar">العقارات السورية</span>
                </div>
            </a>
            <a href="profile.html" class="w-10 h-10 bg-white/10 rounded-2xl flex items-center justify-center border border-white/20"><i class="fas fa-arrow-right"></i></a>
        </div>
    </header>

    <main class="max-w-md mx-auto p-6 my-6 rounded-3xl shadow-sm border" style="background-color:var(--color-card); color:var(--color-text);">
        <div class="text-center mb-6">
            <i class="fas fa-headset text-4xl mb-3" style="color:var(--color-primary);"></i>
            <h1 class="text-xl font-black" data-i18n="contactDev">تواصل مع المطورين</h1>
            <p class="text-sm mt-1" style="color:var(--color-text-muted);">لديك اقتراح أو مشكلة تقنية؟ راسلنا مباشرة</p>
        </div>

        <div class="space-y-3">
            <a href="https://wa.me/905527951877" target="_blank"
               class="flex items-center justify-center gap-3 w-full bg-green-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">
                <i class="fab fa-whatsapp text-2xl"></i><span>تواصل عبر واتساب</span>
            </a>
            <a href="mailto:syriaestate.s@gmail.com"
               class="flex items-center justify-center gap-3 w-full btn-primary">
                <i class="fas fa-envelope"></i><span>راسلنا عبر البريد الإلكتروني</span>
            </a>
        </div>

        <hr class="my-6" style="border-color:var(--color-border);">

        <form id="contactForm" class="space-y-4">
            <div>
                <label class="block text-xs font-bold mb-1" style="color:var(--color-text-muted);">الاسم</label>
                <input type="text" id="contactName" class="input-field" required>
            </div>
            <div>
                <label class="block text-xs font-bold mb-1" style="color:var(--color-text-muted);">رسالتك</label>
                <textarea id="contactMessage" rows="4" class="input-field" required placeholder="اكتب اقتراحك أو المشكلة التي واجهتها..."></textarea>
            </div>
            <button type="submit" class="btn-accent w-full">إرسال الرسالة</button>
            <p class="text-[11px] text-center" style="color:var(--color-text-muted);">
                سيتم فتح تطبيق البريد لديك لإرسال الرسالة مباشرة لفريق الدعم
            </p>
        </form>
    </main>

    <script type="module" src="app.js"></script>
    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('contactName').value.trim();
            const msg  = document.getElementById('contactMessage').value.trim();
            const subject = encodeURIComponent('رسالة من ' + name + ' - العقارات السورية');
            const body    = encodeURIComponent(msg + '\n\n— ' + name);
            window.location.href = `mailto:syriaestate.s@gmail.com?subject=${subject}&body=${body}`;
        });
    </script>
</body>
</html>
