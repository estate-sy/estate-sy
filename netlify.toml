# ══════════════════════════════════════════════════════════════════
# netlify.toml — إعدادات النشر لمشروع العقارات السورية
# ضعه في جذر المستودع (نفس مستوى index.html ومجلد netlify/)
# ══════════════════════════════════════════════════════════════════

[build]
  # مجلد النشر: عدّله إن كانت ملفاتك داخل مجلد فرعي مثل "public" أو "dist"
  publish = "."

  # هذا هو السطر الحاسم: يخبر Netlify أين يجد الدوال (Functions)
  # بدونه، /.netlify/functions/property-og نفسها قد ترجع 404 حتى لو الملف موجود فعلياً
  functions = "netlify/functions"

# ──────────────────────────────────────────────────────────────────
# التوجيه: أي رابط بصيغة /p/شيء → دالة property-og مع تمرير المعرّف
# نستخدم splat (*) بدل :id لأنه الصيغة الأكثر ثباتاً ودعماً في Netlify
# ──────────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/p/*"
  to     = "/.netlify/functions/property-og?id=:splat"
  status = 200
  force  = true   # يضمن تطبيق هذه القاعدة حتى لو وُجد ملف/مسار آخر مطابق جزئياً
